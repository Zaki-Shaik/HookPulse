server.port=8080

spring.datasource.url=jdbc:postgresql://localhost:5432/hookpulse
spring.datasource.username=hookpulse
spring.datasource.password=hookpulse
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.rabbitmq.host=localhost
spring.rabbitmq.port=5672
spring.rabbitmq.username=hookpulse
spring.rabbitmq.password=hookpulse

spring.data.redis.host=localhost
spring.data.redis.port=6379

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.prometheus.metrics.export.enabled=true

logging.level.org.springframework.amqp=INFO
logging.level.org.springframework.web=INFO

hookpulse.delivery.exchange=hookpulse.delivery.exchange
hookpulse.delivery.queue=hookpulse.delivery.queue
hookpulse.delivery.dlq=hookpulse.delivery.dlq
hookpulse.delivery.routing-key=delivery.dispatch
hookpulse.delivery.dead-letter-routing-key=delivery.dead-letter
hookpulse.webhook.signature-header=Webhook-Signature
hookpulse.webhook.timestamp-header=Webhook-Timestamp
